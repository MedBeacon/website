[build]
  publish = "."

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'"

# Long cache for images (1 year)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for CSS/JS (10 minutes)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=600"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=600"

# Branch deploy context
[context.branch-deploy]
  publish = "."
